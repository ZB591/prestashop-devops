version: "3.9"

networks:
  frontend-net:
  backend-net:
  monitoring-net:

volumes:
  mysql-data:
  prestashop-data:
  backup-data:
  prometheus-data:
  grafana-data:

services:

  # ── Base de données MySQL ──────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ps-mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PrestaShop ─────────────────────────────────────────
  prestashop:
    build: .
    container_name: ps-app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_SERVER: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWD: ${MYSQL_PASSWORD}
      PS_DOMAIN: ${PS_DOMAIN}
      PS_FOLDER_ADMIN: ${PS_FOLDER_ADMIN}
      ADMIN_MAIL: ${ADMIN_MAIL}
      ADMIN_PASSWD: ${ADMIN_PASSWD}
      PS_LANGUAGE: fr
      PS_COUNTRY: fr
    volumes:
      - prestashop-data:/var/www/html
    networks:
      - frontend-net
      - backend-net
    depends_on:
      mysql:
        condition: service_healthy

  # ── phpMyAdmin ─────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ps-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - backend-net
      - frontend-net
    ports:
      - "8080:80"

  # ── NGINX Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ps-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend-net
    depends_on:
      - prestashop

  # ── Prometheus ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ps-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - monitoring-net
    ports:
      - "9090:9090"

  # ── Grafana ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ps-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - monitoring-net
    ports:
      - "3000:3000"

  # ── cAdvisor ───────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ps-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring-net
    ports:
      - "8081:8080"

  # ── Node Exporter ──────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ps-node-exporter
    restart: unless-stopped
    networks:
      - monitoring-net
    ports:
      - "9100:9100"

  # ── Alertmanager ───────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: ps-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring-net
    ports:
      - "9093:9093"

  # ── Backup automatique ─────────────────────────────────
  backup:
    image: mysql:8.0
    container_name: ps-backup
    restart: unless-stopped
    env_file: .env
    volumes:
      - backup-data:/backups
      - ./backup/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/bash", "/backup.sh"]
    networks:
      - backend-net
    depends_on:
      mysql:
        condition: service_healthy